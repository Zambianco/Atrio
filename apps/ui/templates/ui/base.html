{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Atrio{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">

  {% block extra_css %}{% endblock %}
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'ui:painel' %}">
      <i class="bi bi-shield-check me-2"></i>Atrio
    </a>

    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:nova_visita' %}">Nova Visita</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:painel' %}">Painel</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:nova_pessoa' %}">Nova Pessoa</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:novo_veiculo' %}">Novo Veículo</a></li>
    </ul>
  </div>
</nav>

<main class="container py-4 flex-grow-1">
  {% block content %}{% endblock %}
</main>

<footer class="footer mt-auto bg-dark text-light py-3 text-center">
  <small>&copy; Atrio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Global confirmation modal and helper -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalLabel">Confirmação</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">Mensagem</div>
      <div class="modal-footer">
        <button type="button" id="confirmCancel" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" id="confirmOk" class="btn btn-primary">Confirmar</button>
      </div>
    </div>
  </div>
</div>
<script>
  window.showConfirm = function(message, title) {
    return new Promise((resolve) => {
      const modalEl = document.getElementById('confirmModal');
      if (!modalEl) return resolve(window.confirm(message));
      const modal = new bootstrap.Modal(modalEl);
      const body = modalEl.querySelector('.modal-body');
      const label = modalEl.querySelector('.modal-title');
      const ok = modalEl.querySelector('#confirmOk');
      const cancel = modalEl.querySelector('#confirmCancel');

      label.textContent = title || 'Confirmação';
      body.textContent = message;

      const finish = (val) => {
        ok.removeEventListener('click', onOk);
        cancel.removeEventListener('click', onCancel);
        const onHidden = () => {
          try { modalEl.removeEventListener('hidden.bs.modal', onHidden); } catch(e) {}
          resolve(val);
        };
        modalEl.addEventListener('hidden.bs.modal', onHidden);
        try { modal.hide(); } catch(e) { modalEl.removeEventListener('hidden.bs.modal', onHidden); resolve(val); }
      };

      const onOk = () => finish(true);
      const onCancel = () => finish(false);

      ok.addEventListener('click', onOk);
      cancel.addEventListener('click', onCancel);

      modal.show();
    });
  };

  // Mostrar um alerta informativo usando o modal de confirmação (apenas OK)
  window.showAlert = function(message, title) {
    return new Promise((resolve) => {
      const modalEl = document.getElementById('confirmModal');
      if (!modalEl) {
        alert(message);
        return resolve();
      }
      const modal = new bootstrap.Modal(modalEl);
      const body = modalEl.querySelector('.modal-body');
      const label = modalEl.querySelector('.modal-title');
      const ok = modalEl.querySelector('#confirmOk');
      const cancel = modalEl.querySelector('#confirmCancel');

      label.textContent = title || 'Aviso';
      body.textContent = message;
      // esconder o botão cancelar e renomear o OK
      cancel.style.display = 'none';
      ok.textContent = 'OK';

      const finish = () => {
        ok.removeEventListener('click', onOk);
        const onHidden = () => {
          try { modalEl.removeEventListener('hidden.bs.modal', onHidden); } catch(e) {}
          // restore UI
          cancel.style.display = '';
          ok.textContent = 'Confirmar';
          resolve();
        };
        modalEl.addEventListener('hidden.bs.modal', onHidden);
        try { modal.hide(); } catch(e) { modalEl.removeEventListener('hidden.bs.modal', onHidden); cancel.style.display = ''; ok.textContent = 'Confirmar'; resolve(); }
      };

      const onOk = () => finish();
      ok.addEventListener('click', onOk);

      modal.show();
    });
  };
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
