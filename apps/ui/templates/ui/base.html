{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Atrio{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">

  {% block extra_css %}{% endblock %}
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'ui:painel' %}">
      <i class="bi bi-shield-check me-2"></i>Atrio
    </a>

    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:nova_visita' %}">Nova Visita</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:painel' %}">Painel</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:nova_pessoa' %}">Nova Pessoa</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'ui:novo_veiculo' %}">Novo Veículo</a></li>
    </ul>
  </div>
</nav>

<main class="container py-4 flex-grow-1">
  {% block content %}{% endblock %}
</main>

<footer class="footer mt-auto bg-dark text-light py-3 text-center">
  <small>&copy; Atrio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
