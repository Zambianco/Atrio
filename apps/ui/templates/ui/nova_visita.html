{% extends "ui/base.html" %}
{% load static %}

{% block title %}Nova Visita{% endblock %}

{% block content %}
<h2 class="mb-4">Nova Visita</h2>

<div class="mb-3">
  <label class="form-label">Motivo</label>
  <input id="motivo" class="form-control">
</div>

<div class="mb-3">
  <label class="form-label">Responsável</label>
  <input id="responsavel" class="form-control">
</div>

<button id="btnCriarCancelar" class="btn btn-primary">Criar Visita</button>

<hr>

<h4>Pessoas</h4>
<ul id="listaPessoas"></ul>

<h4>Veículos</h4>
<ul id="listaVeiculos"></ul>

<button id="btnRegistrar" class="btn btn-success mt-3">Registrar</button>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/nova_visita.js' %}"></script>
{% endblock %}
