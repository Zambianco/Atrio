services:
  web:
    build: .
    env_file:
      - Atrio/.env
    cpus: ${WEB_CPUS:-1.0}
    mem_limit: ${WEB_MEM:-512m}
    environment:
      - DB_NAME=/data/atrio.sqlite3
      - TZ=${TZ:-America/Sao_Paulo}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8001}:8000"
    volumes:
      - atrio_db:/data
      - staticfiles:/app/staticfiles
      - ${BACKUP_HOST_DIR:-/mnt/atrio-backups}:/mnt/atrio-backups
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn Atrio.wsgi:application --bind 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2); sys.exit(0 if r.status < 500 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
  backup:
    build:
      context: .
      dockerfile: docker/Dockerfile.backup
    env_file:
      - Atrio/.env
    cpus: ${BACKUP_CPUS:-0.25}
    mem_limit: ${BACKUP_MEM:-128m}
    restart: unless-stopped
    environment:
      - BACKUP_INTERVAL_SECONDS=3600
      - BACKUP_RETAIN_COUNT=168
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - atrio_db:/data
      - ${BACKUP_HOST_DIR:-/mnt/atrio-backups}:/mnt/atrio-backups
    command:
      - python
      - -c
      - |
        import os, time, datetime, sqlite3, subprocess, tempfile
        src = '/data/atrio.sqlite3'
        trigger = '/data/.backup_trigger'
        dst_dir = os.getenv('BACKUP_DIR', '/mnt/atrio-backups')
        os.makedirs(dst_dir, exist_ok=True)
        interval = int(os.getenv('BACKUP_INTERVAL_SECONDS', '3600'))
        retain = int(os.getenv('BACKUP_RETAIN_COUNT', '168'))
        password = os.getenv('BACKUP_PASSWORD', '')
        def run_backup():
            if not os.path.exists(src):
                return
            ts = datetime.datetime.now().strftime('%Y%m%d-%H%M%S')
            with tempfile.NamedTemporaryFile(suffix='.sqlite3', delete=False) as tmp:
                tmp_path = tmp.name
            try:
                src_conn = sqlite3.connect(src)
                dst_conn = sqlite3.connect(tmp_path)
                src_conn.backup(dst_conn)
                dst_conn.close()
                src_conn.close()
                if password:
                    dst = os.path.join(dst_dir, f'db-{ts}.enc')
                    env = os.environ.copy()
                    env['BACKUP_PASSWORD'] = password
                    result = subprocess.run(
                        ['openssl', 'enc', '-aes-256-cbc', '-pbkdf2', '-iter', '100000',
                         '-in', tmp_path, '-out', dst, '-pass', 'env:BACKUP_PASSWORD'],
                        capture_output=True, text=True, env=env
                    )
                    if result.returncode != 0:
                        raise RuntimeError(f'openssl falhou (rc={result.returncode}): {result.stderr.strip()}')
                else:
                    import shutil
                    dst = os.path.join(dst_dir, f'db-{ts}.sqlite3')
                    shutil.move(tmp_path, dst)
                    tmp_path = None
            finally:
                if tmp_path and os.path.exists(tmp_path):
                    os.remove(tmp_path)
            ext = '.enc' if password else '.sqlite3'
            if retain > 0 and os.path.isdir(dst_dir):
                files = [
                    os.path.join(dst_dir, name)
                    for name in os.listdir(dst_dir)
                    if name.startswith('db-') and name.endswith(ext)
                ]
                files.sort(key=os.path.getmtime, reverse=True)
                for old in files[retain:]:
                    try:
                        os.remove(old)
                    except OSError:
                        pass
        while True:
            try:
                run_backup()
            except Exception as e:
                print(f'[backup] erro: {e}', flush=True)
            elapsed = 0
            while elapsed < interval:
                time.sleep(5)
                elapsed += 5
                if os.path.exists(trigger):
                    try:
                        os.remove(trigger)
                    except OSError:
                        pass
                    try:
                        run_backup()
                    except Exception as e:
                        print(f'[backup] erro: {e}', flush=True)
                    elapsed = 0

volumes:
  atrio_db:
  staticfiles:
